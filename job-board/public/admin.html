<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — DailyJobsPK</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="logo">Daily<span>JobsPK</span></div>
  <nav class="site-nav">
    <a href="index.html">← View Website</a>
  </nav>
</header>

<div class="admin-wrap">
  <h1>Admin Panel</h1>

  <div class="card">
    <div class="field">
      <label>Admin Password</label>
      <input type="password" id="adminPassword" placeholder="Enter password">
    </div>
  </div>

  <div class="card">
    <h2 style="margin-bottom:16px; font-size:1.1rem;">Add New Job</h2>
    <form id="jobForm">
      <div class="field-row">
        <div class="field">
          <label>Job Title</label>
          <input type="text" id="title" required placeholder="e.g. Cashier">
        </div>
        <div class="field">
          <label>Company / Bank</label>
          <input type="text" id="company" required placeholder="e.g. Meezan Bank">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>City</label>
          <!-- Options are filled in dynamically by script.js (PAKISTAN_CITIES),
               so this list always stays identical to the homepage city filter. -->
          <select id="location" required>
            <option value="">-- Select City --</option>
          </select>
        </div>
        <div class="field" id="otherCityWrap" style="display:none;">
          <label>Enter city name</label>
          <input type="text" id="otherCity" placeholder="e.g. Sadiqabad">
        </div>
        <div class="field">
          <label>Last Date to Apply</label>
          <input type="date" id="lastDate">
        </div>
      </div>
      <div class="field">
        <label>Short Description</label>
        <textarea id="description" rows="3" placeholder="Write a short job description..."></textarea>
      </div>
      <div class="field">
        <label>Apply Link (official job posting URL)</label>
        <input type="url" id="applyLink" required placeholder="https://...">
      </div>
      <div class="field">
        <label>Job Advertisement / Picture (optional)</label>
        <input type="file" id="jobImage" accept="image/png, image/jpeg, image/webp, image/gif">
        <div id="imagePreviewName" class="file-hint"></div>
        <div class="file-hint">JPG, PNG, WEBP or GIF — max 3MB</div>
      </div>
      <button type="submit" class="btn">Add Job</button>
      <div id="formMsg" class="msg"></div>
    </form>
  </div>

  <div class="card">
    <h2 style="margin-bottom:16px; font-size:1.1rem;">Current Jobs (click Delete to remove)</h2>
    <div id="adminJobList">Loading...</div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
